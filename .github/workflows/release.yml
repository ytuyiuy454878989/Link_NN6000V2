name: Go_Release

on:
  workflow_dispatch:
  schedule:
    # 每 3 天编译一次（UTC 时间，北京时间 = UTC+8）
    # UTC 20:00 = 北京时间 04:00
    - cron: '0 20 */3 * *'

env:
  DEVICE_MODEL: link_nn6000v2_immwrt
  REPO_URL: https://github.com/VIKINGYFY/immortalwrt.git
  REPO_BRANCH: main
  BUILD_DIR: imm-nss
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    permissions:
      actions: write
      contents: write
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      
      - name: Build System Setup
        run: |
          # 步骤 1: 清理预装软件
          echo "=== Disk Space Before Cleanup ==="
          df -h
          
          # 卸载大型不需要的软件包
          sudo apt-get purge -y \
            dotnet* \
            ghc* \
            libboost* \
            android* \
            swift* \
            chromium* \
            chrome* \
            firefox* \
            ffmpeg* \
            powershell* \
            codeql* \
            microsoft* \
            || true
          
          sudo apt-get autoremove -y --purge
          sudo docker system prune -a -f 2>/dev/null || true
          sudo rm -rf /var/lib/apt/lists/*
          
          echo "=== Disk Space After Cleanup ==="
          df -h
          
          # 步骤 2: 初始化构建环境
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          
          # 步骤 3: 安装额外依赖
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          
          # 步骤 4: 清理安装产生的缓存
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo rm -rf /var/lib/apt/lists/*
          
          sudo -E systemctl daemon-reload
          
          echo "=== Final Disk Space ==="
          df -h

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          echo "BUILD_SRC=${{ env.REPO_URL }}" >> $GITHUB_ENV

      - name: Clone Source Code
        run: |
          chmod +x ./nn6000v2/scripts/update.sh
          chmod +x ./nn6000v2/scripts/build.sh
          
          # 克隆仓库
          echo "克隆仓库: ${{ env.REPO_URL }} 分支: ${{ env.REPO_BRANCH }}"
          git clone --depth 1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} ./action_build
          cd ./action_build && git rev-parse HEAD > ../repo_flag
          cd ..
          
          # 移除国内下载源
          PROJECT_MIRRORS_FILE="./action_build/scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

      - name: Generate Cache Key
        id: cache-key
        run: |
          # 基于 repo_flag 生成缓存键
          CACHE_HASH=$(sha256sum ./repo_flag | cut -d' ' -f1)
          echo "hash=${CACHE_HASH}" >> $GITHUB_OUTPUT
          echo "完整缓存键: ${{ matrix.os }}-${CACHE_HASH}"

      - name: Cache Build Dependencies
        uses: actions/cache@v5.0.4
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ steps.cache-key.outputs.hash }}
          restore-keys: |
            ${{ matrix.os }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Build Firmware
        run: |
          ./nn6000v2/scripts/build.sh ${{ env.DEVICE_MODEL }}
          
          # 获取内核版本
          FIRST_MANIFEST=$(ls ./firmware/immortalwrt-*.manifest 2>/dev/null | head -1)
          if [ -n "$FIRST_MANIFEST" ]; then
            echo "Manifest 文件：$FIRST_MANIFEST"
            echo "查找内核版本..."
            KVER=$(grep "^kernel " "$FIRST_MANIFEST" | grep -oE "[4-6]\.[0-9]+\.[0-9]+" | head -1 || echo "")
            if [ -n "$KVER" ]; then
              echo "KVER=$KVER" >> $GITHUB_ENV
              echo "内核版本：$KVER"
            else
              echo "KVER=unknown" >> $GITHUB_ENV
              echo "未找到内核版本"
            fi
          else
            echo "KVER=unknown" >> $GITHUB_ENV
            echo "manifest 文件不存在"
          fi

      - name: Cleanup Old Cache
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用之前生成的缓存键
          CURRENT_KEY="${{ matrix.os }}-${{ steps.cache-key.outputs.hash }}"
          echo "当前缓存键: $CURRENT_KEY"
          echo ""
          
          # 获取所有缓存
          CACHE_LIST=$(gh cache list --json id,key,sizeInBytes,createdAt 2>/dev/null)
          
          if [ -z "$CACHE_LIST" ] || [ "$CACHE_LIST" = "[]" ]; then
            echo "✓ 无现有缓存，跳过清理"
            exit 0
          fi
          
          # 列出所有缓存
          echo "检查现有缓存..."
          echo "$CACHE_LIST" | \
            jq -r '.[] | "\(.key)\t\(.id)\t\(.sizeInBytes / 1024 / 1024 | floor)MB\t\(.createdAt)"' | \
            sort -t$'\t' -k4 -r
          
          echo ""
          echo "清理与当前 key 不同的旧缓存..."
          
          # 删除与当前 key 不同的所有缓存
          echo "$CACHE_LIST" | \
            jq -r ".[] | select(.key != \"$CURRENT_KEY\") | .id" | \
          while read -r cache_id; do
            if [ -n "$cache_id" ]; then
              echo "  删除旧缓存 ID: $cache_id"
              gh cache delete "$cache_id" 2>/dev/null || true
            fi
          done
          
          echo ""
          echo "✓ 旧缓存清理完成"

      - name: Machine Information
        run: |
          echo "=============================================="
          lscpu | grep -E "name|Core|Thread"
          echo "=============================================="
          df -h
          echo "=============================================="

      - name: Prepare Release Body
        run: |
          {
            echo "## 版本信息"
            echo "- 源码：${{ env.BUILD_SRC }}"
            echo "- Kernel: ${{ env.KVER }}"
            echo "- WIFI 密码：147258369"
            echo "- LAN 地址：10.0.0.1"
            echo "- 账户：root"
            echo "- 密码：无"
            echo "- no_wifi 后缀的版本未包含 WIFI 驱动程序"
          } > release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ env.DEVICE_MODEL }}
          files: |
            ./firmware/*.bin
            ./firmware/immortalwrt-*.manifest
            ./firmware/*.img.gz
            ./firmware/*.itb
            ./firmware/*.fip
            ./firmware/*.ubi
          body_path: ./release_body.txt
          make_latest: true

      - name: Cleanup Old Versions
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=========================================="
          echo "开始清理旧版本（保留最近 2 个）..."
          echo "=========================================="
          
          # ========== 1. 清理 Releases (自动清理关联的 Tags) ==========
          echo ""
          echo "[1/2] 清理旧的 Releases 和 Tags..."
          
          # 按创建时间排序，获取所有 release，跳过前 2 个最新的
          gh release list --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[2:].[].tagName' 2>/dev/null | \
          while read -r tag; do
            if [ -n "$tag" ]; then
              echo "  删除 release 和 tag: $tag"
              gh release delete "$tag" --cleanup-tag --yes 2>/dev/null || true
            fi
          done
          
          echo "  ✓ Releases 和 Tags 清理完成"
          
          # ========== 2. 清理 Workflow 运行记录 ==========
          echo ""
          echo "[2/2] 清理旧的 Workflow 运行记录..."
          
          # 获取当前 workflow 的所有运行记录，按创建时间排序，跳过前 2 个
          RUN_IDS=$(gh api /repos/${{ github.repository }}/actions/workflows/release.yml/runs \
            --paginate \
            --jq '[.workflow_runs[] | {id: .id, created_at: .created_at}] | sort_by(.created_at) | reverse | .[2:].[].id' 2>/dev/null)
          
          if [ -n "$RUN_IDS" ]; then
            echo "$RUN_IDS" | while read -r run_id; do
              if [ -n "$run_id" ]; then
                echo "  删除 workflow run: $run_id"
                gh api -X DELETE /repos/${{ github.repository }}/actions/runs/"$run_id" 2>/dev/null || true
              fi
            done
          else
            echo "  无需清理 Workflow 记录"
          fi
          
          echo "  ✓ Workflow 记录清理完成"
          
          echo ""
          echo "=========================================="
          echo "清理完成！"
          echo "=========================================="
          
          # 显示当前状态
          echo ""
          echo "当前保留的 Releases:"
          gh release list --limit 5 2>/dev/null || echo "  无 releases"
